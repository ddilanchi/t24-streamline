<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T24 3D Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #1a2233; color: #c9d1d9;
       display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* Header */
#header { display: flex; align-items: center; gap: 10px; padding: 8px 14px;
          background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0; }
#header h1 { font-size: 15px; font-weight: 600; color: #58a6ff; white-space: nowrap; }
#file-select { background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
               border-radius: 6px; padding: 4px 8px; font-size: 13px; cursor: pointer; }
.hbtn { padding: 5px 12px; border-radius: 6px; border: 1px solid #30363d;
        background: #21262d; color: #c9d1d9; font-size: 13px; cursor: pointer; }
.hbtn:hover { background: #30363d; }
.hbtn.primary { background: #238636; border-color: #2ea043; color: #fff; }
.hbtn.primary:hover { background: #2ea043; }
#status-pill { margin-left: auto; font-size: 12px; color: #8b949e; }
#status-pill.ok { color: #3fb950; }
#status-pill.err { color: #f85149; }
#status-pill.busy { color: #d29922; }

/* Main layout */
#main { display: flex; flex: 1; overflow: hidden; }

/* 3D Viewport */
#vp-wrap { position: relative; flex: 0 0 62%; overflow: hidden; }
#canvas { display: block; width: 100%; height: 100%; }
#compass-ring { position: absolute; bottom: 10px; left: 10px; width: 100px; height: 100px;
                border-radius: 50%; border: 2px solid rgba(255,255,255,0.6);
                background: rgba(0,0,0,0.5); pointer-events: none; }
#legend { position: absolute; top: 10px; left: 10px; background: rgba(13,17,23,.85);
          border: 1px solid #30363d; border-radius: 8px; padding: 8px 10px;
          font-size: 11px; line-height: 1.8; }
#legend .dot { display: inline-block; width: 10px; height: 10px;
               border-radius: 2px; margin-right: 5px; vertical-align: middle; }
.leg-item { cursor: pointer; padding: 1px 4px; border-radius: 4px; user-select: none; }
.leg-item:hover { background: rgba(88,166,255,.15); }
.leg-item:not(.active) { opacity: 0.35; text-decoration: line-through; }
.leg-item:not(.active) .dot { opacity: 0.3; }
#sel-info { position: absolute; bottom: 10px; right: 10px; max-width: 260px;
            background: rgba(13,17,23,.9); border: 1px solid #30363d;
            border-radius: 8px; padding: 8px 10px; font-size: 12px;
            display: none; }
#sel-info h3 { font-size: 13px; color: #58a6ff; margin-bottom: 4px; }
#sel-info table { width: 100%; }
#sel-info td:first-child { color: #8b949e; padding-right: 8px; }

/* Data panel */
#data-panel { flex: 1; display: flex; flex-direction: column;
              border-left: 1px solid #30363d; overflow: hidden; }
#tabs { display: flex; border-bottom: 1px solid #30363d; flex-shrink: 0; }
.tab-btn { flex: 1; padding: 8px 4px; background: transparent; border: none;
           color: #8b949e; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; }
.tab-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; }
.tab-btn:hover:not(.active) { color: #c9d1d9; background: #161b22; }
#tab-content { flex: 1; overflow-y: auto; }
.tab-pane { display: none; padding: 10px; }
.tab-pane.active { display: block; }

/* Project key-value table */
.kv-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.kv-table td { padding: 6px 8px; border-bottom: 1px solid #21262d; vertical-align: middle; }
.kv-table td:first-child { color: #8b949e; width: 44%; white-space: nowrap; }
.kv-table td:last-child { color: #e6edf3; }
.kv-table td[contenteditable="true"] { background: #1c2128; outline: 1px solid #58a6ff;
  border-radius: 3px; }

/* Data grid tables */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th { background: #161b22; color: #8b949e; padding: 6px 6px;
                 font-weight: 600; text-align: left; border-bottom: 1px solid #30363d;
                 white-space: nowrap; position: sticky; top: 0; z-index: 1; }
.data-table td { padding: 5px 6px; border-bottom: 1px solid #161b22;
                 white-space: nowrap; max-width: 140px; overflow: hidden;
                 text-overflow: ellipsis; cursor: default; }
.data-table tr:hover td { background: #161b22; }
.data-table tr.selected td { background: #1c2a3a; }
.data-table td.editable[contenteditable="true"] {
  background: #1c2128; outline: 1px solid #58a6ff;
  border-radius: 3px; white-space: normal; overflow: visible; cursor: text; }
.del-btn { background: none; border: none; color: #6e7681; cursor: pointer;
           font-size: 12px; padding: 1px 4px; border-radius: 3px; }
.del-btn:hover { color: #f85149; background: #21262d; }
.add-row-btn { margin: 8px 0; padding: 5px 10px; background: #21262d;
               border: 1px dashed #30363d; color: #8b949e; border-radius: 6px;
               cursor: pointer; font-size: 12px; width: 100%; }
.add-row-btn:hover { background: #30363d; color: #c9d1d9; }

/* Generate output toast */
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
         background: #161b22; border: 1px solid #30363d; border-radius: 8px;
         padding: 10px 16px; font-size: 13px; max-width: 480px; display: none;
         z-index: 999; white-space: pre-wrap; }
#toast.ok { border-color: #2ea043; }
#toast.err { border-color: #f85149; }

/* Sun controls */
#sun-bar { position: absolute; bottom: 10px; left: 100px; right: 10px;
           display: flex; align-items: center; gap: 8px;
           background: rgba(22,27,34,.88); border: 1px solid #30363d;
           border-radius: 8px; padding: 6px 12px; font-size: 12px; z-index: 5; }
#sun-bar button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
                  border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: 14px; }
#sun-bar button:hover { background: #30363d; }
#sun-bar button.active { background: #238636; border-color: #2ea043; color: #fff; }
#sun-slider { flex: 1; accent-color: #f0c040; cursor: pointer; }
#sun-time { color: #f0c040; font-weight: 600; min-width: 52px; text-align: center; }
</style>
</head>
<body>

<div id="header">
  <h1>T24 3D Viewer</h1>
  <select id="file-select"></select>
  <button class="hbtn" onclick="browseFile()">📂 Open File</button>
  <button class="hbtn" onclick="importJson()">📥 Import JSON</button>
  <button class="hbtn" onclick="location.reload()">⟳ Reload</button>
  <button class="hbtn primary" onclick="generateXML()">Generate gbXML</button>
  <span id="status-pill">Loading…</span>
</div>

<div id="main">
  <div id="vp-wrap">
    <canvas id="canvas"></canvas>
    <div id="legend">
      <div class="leg-item active" data-layer="extwall" onclick="toggleLayer(this)"><span class="dot" style="background:#E8C840"></span>Exterior Wall</div>
      <div class="leg-item active" data-layer="intwall" onclick="toggleLayer(this)"><span class="dot" style="background:#9E9E9E"></span>Interior Wall</div>
      <div class="leg-item active" data-layer="roof" onclick="toggleLayer(this)"><span class="dot" style="background:#C85250"></span>Roof</div>
      <div class="leg-item active" data-layer="slab" onclick="toggleLayer(this)"><span class="dot" style="background:#607D8B"></span>Slab</div>
      <div class="leg-item active" data-layer="window" onclick="toggleLayer(this)"><span class="dot" style="background:#4488EE"></span>Window</div>
      <div class="leg-item active" data-layer="skylight" onclick="toggleLayer(this)"><span class="dot" style="background:#CC44CC"></span>Skylight</div>
      <div class="leg-item active" data-layer="door" onclick="toggleLayer(this)"><span class="dot" style="background:#E04040"></span>Door</div>
      <div class="leg-item active" data-layer="zone" onclick="toggleLayer(this)"><span class="dot" style="background:#4A90E2;opacity:.4"></span>Zones</div>
      <div class="leg-item active" data-layer="label" onclick="toggleLayer(this)"><span class="dot" style="background:#e6edf3;opacity:.6"></span>Labels</div>
      <div id="floor-toggles" style="margin-top:6px;border-top:1px solid #555;padding-top:4px;"></div>
    </div>
    <div id="compass-ring"></div>
    <div id="sun-bar">
      <button id="sun-play" onclick="toggleSunPlay()" title="Play/pause sun animation">&#9654;</button>
      <input id="sun-slider" type="range" min="360" max="1140" value="600" step="1"
             oninput="setSunMinute(+this.value)" title="Time of day (6am–7pm)">
      <span id="sun-time">10:00</span>
    </div>
    <div id="sel-info"><h3 id="sel-title"></h3><table id="sel-table"></table></div>
  </div>

  <div id="data-panel">
    <div id="tabs">
      <button class="tab-btn active" onclick="showTab('project')">Project</button>
      <button class="tab-btn" onclick="showTab('zones')">Zones</button>
      <button class="tab-btn" onclick="showTab('walls')">Walls</button>
      <button class="tab-btn" onclick="showTab('openings')">Openings</button>
    </div>
    <div id="tab-content">
      <div id="pane-project" class="tab-pane active"></div>
      <div id="pane-zones" class="tab-pane"></div>
      <div id="pane-walls" class="tab-pane"></div>
      <div id="pane-openings" class="tab-pane"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── State ─────────────────────────────────────────────────────────────────
let scene, camera, renderer, controls, raycaster, mouse;
let compassScene, compassCam;
let selectedMesh = null;
let buildingGroup = null;
let currentFile = null;
let buildingData = null;
let geometryData = null;
let lastMtime = 0;
let isEditing = false;

// ── Idle timeout: close after 1 hour of no input ─────────────────────────
let _idleTimer = null;
const IDLE_TIMEOUT_MS = 60 * 60 * 1000; // 1 hour
function resetIdleTimer() {
  if (_idleTimer) clearTimeout(_idleTimer);
  _idleTimer = setTimeout(() => {
    document.title = 'Session timed out';
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#1e2a38;color:#ccc;font:24px sans-serif;text-align:center"><div>Session timed out after 1 hour of inactivity.<br><button onclick="location.reload()" style="margin-top:20px;padding:10px 24px;font-size:18px;cursor:pointer">Reload</button></div></div>';
  }, IDLE_TIMEOUT_MS);
}
['mousemove','mousedown','keydown','scroll','touchstart'].forEach(
  evt => document.addEventListener(evt, resetIdleTimer, { passive: true })
);
// wheel separately — don't interfere with OrbitControls preventDefault
document.addEventListener('wheel', resetIdleTimer, { passive: true, capture: false });
resetIdleTimer();
let selectedId = null;
let selectableObjects = []; // {mesh, id, type, data}
let sunLight, sunSphere, sunGlow;
let sunMinute = 600;       // minutes since midnight (0–1440)
let sunPlaying = false;
let sunSpeed = 2;          // minutes per frame

// ── Three.js init ─────────────────────────────────────────────────────────
function initThree() {
  const canvas = document.getElementById('canvas');
  const wrap = canvas.parentElement;

  renderer = new THREE.WebGLRenderer({ antialias: true, canvas });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.autoClear = false;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x2a3444);
  scene.fog = new THREE.FogExp2(0x2a3444, 0.0005);

  camera = new THREE.PerspectiveCamera(45, 1, 0.1, 3000);
  camera.position.set(0, 80, 120);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.minDistance = 0.1;
  controls.maxDistance = 3000;
  controls.zoomSpeed = 2.5;
  controls.panSpeed = 1.5;
  controls.rotateSpeed = 0.8;
  controls.screenSpacePanning = true;
  controls.maxPolarAngle = Math.PI * 0.88;

  // Double-click to zoom to point under cursor
  renderer.domElement.addEventListener('dblclick', (e) => {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(scene.children, true);
    if (hits.length > 0) {
      const pt = hits[0].point;
      // Animate camera target to the clicked point
      const start = controls.target.clone();
      const startPos = camera.position.clone();
      // Move camera closer: keep direction, reduce distance to 30% of current
      const dir = startPos.clone().sub(pt).normalize();
      const dist = startPos.distanceTo(pt);
      const newDist = Math.max(dist * 0.3, 2);
      const endPos = pt.clone().add(dir.multiplyScalar(newDist));
      let t = 0;
      const flyTo = () => {
        t += 0.06;
        if (t >= 1) t = 1;
        const ease = t * (2 - t); // ease-out
        controls.target.lerpVectors(start, pt, ease);
        camera.position.lerpVectors(startPos, endPos, ease);
        controls.update();
        if (t < 1) requestAnimationFrame(flyTo);
      };
      flyTo();
    }
  });

  // Lights — brighter scene
  scene.add(new THREE.AmbientLight(0xffffff, 1.2));
  scene.add(new THREE.HemisphereLight(0x87CEEB, 0x4a6741, 0.5));  // sky/ground
  const fill = new THREE.DirectionalLight(0x8ab4f8, 0.25);
  fill.position.set(-60, 40, -80);
  scene.add(fill);

  // Sun light with shadows
  sunLight = new THREE.DirectionalLight(0xfff4d6, 1.8);
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.set(2048, 2048);
  sunLight.shadow.camera.left = -200;
  sunLight.shadow.camera.right = 200;
  sunLight.shadow.camera.top = 200;
  sunLight.shadow.camera.bottom = -200;
  sunLight.shadow.camera.near = 1;
  sunLight.shadow.camera.far = 600;
  sunLight.shadow.bias = -0.001;
  scene.add(sunLight);
  scene.add(sunLight.target);

  // Sun sphere (visual) — large enough to see from any angle
  const sunGeo = new THREE.SphereGeometry(8, 24, 24);
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFDD44 });
  sunSphere = new THREE.Mesh(sunGeo, sunMat);
  scene.add(sunSphere);
  // Inner glow
  const glowGeo = new THREE.SphereGeometry(12, 24, 24);
  const glowMat = new THREE.MeshBasicMaterial({ color: 0xFFEE88, transparent: true, opacity: 0.2 });
  sunGlow = new THREE.Mesh(glowGeo, glowMat);
  scene.add(sunGlow);
  // Outer corona
  const coronaGeo = new THREE.SphereGeometry(18, 16, 16);
  const coronaMat = new THREE.MeshBasicMaterial({ color: 0xFFFF99, transparent: true, opacity: 0.08 });
  const corona = new THREE.Mesh(coronaGeo, coronaMat);
  sunSphere.add(corona);  // child of sunSphere so it follows automatically

  // Sun path arc (dashed line showing trajectory) — seasonal for LA
  const arcPts = [];
  {
    const latR = 34.05 * Math.PI / 180;
    const now2 = new Date();
    const doy = Math.floor((now2 - new Date(now2.getFullYear(),0,0)) / 86400000);
    const declR = -23.44 * Math.cos(2 * Math.PI * (doy + 10) / 365) * Math.PI / 180;
    for (let m = 240; m <= 1260; m += 10) {
      const hh = m / 60;
      const haD = (hh - 12) * 15;
      const haR = haD * Math.PI / 180;
      const sE = Math.sin(latR) * Math.sin(declR) + Math.cos(latR) * Math.cos(declR) * Math.cos(haR);
      const eR = Math.asin(Math.max(-1, Math.min(1, sE)));
      if (eR < -0.02) continue;
      const cE = Math.cos(eR);
      const sA = cE > 0.01 ? (Math.cos(declR) * Math.sin(haR)) / cE : 0;
      const cA = cE > 0.01 ? (Math.sin(latR) * sE - Math.sin(declR)) / (Math.cos(latR) * cE) : 1;
      const aR = Math.atan2(sA, cA);
      const dd = 250;
      const horiz = dd * cE;
      arcPts.push(new THREE.Vector3(-horiz * Math.sin(aR), dd * Math.sin(Math.max(eR, 0)), horiz * Math.cos(aR)));
    }
  }
  if (arcPts.length > 1) {
    const arcGeo = new THREE.BufferGeometry().setFromPoints(arcPts);
    const arcMat = new THREE.LineDashedMaterial({ color: 0xFFDD44, transparent: true, opacity: 0.3, dashSize: 4, gapSize: 3 });
    const arcLine = new THREE.Line(arcGeo, arcMat);
    arcLine.computeLineDistances();
    scene.add(arcLine);
  }

  // Position sun at default time
  setSunMinute(600);

  // Ground plane for shadow receiving
  const groundGeo = new THREE.PlaneGeometry(800, 800);
  const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.05;
  ground.receiveShadow = true;
  scene.add(ground);

  // Grid
  const grid = new THREE.GridHelper(600, 60, 0x3a4555, 0x2a3444);
  scene.add(grid);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  renderer.domElement.addEventListener('click', onCanvasClick);

  // 3D Compass scene
  compassScene = new THREE.Scene();
  compassScene.background = new THREE.Color(0x1a1a2a);
  compassCam = new THREE.PerspectiveCamera(50, 1, 0.01, 20);
  compassScene.add(new THREE.AmbientLight(0xffffff, 3.0));
  const O = new THREE.Vector3(0, 0, 0);
  const axDefs = [
    { dir: new THREE.Vector3(0, 0, -1), color: 0xffffff, label: 'N', lcolor: '#ffffff' },
    { dir: new THREE.Vector3(1, 0, 0),  color: 0xffffff, label: 'E', lcolor: '#ffffff' },
    { dir: new THREE.Vector3(0, 1, 0),  color: 0xffffff, label: '',  lcolor: '' },
    { dir: new THREE.Vector3(0, 0, 1),  color: 0xaaaaaa, label: 'S', lcolor: '#cccccc' },
    { dir: new THREE.Vector3(-1, 0, 0), color: 0xaaaaaa, label: 'W', lcolor: '#cccccc' },
  ];
  axDefs.forEach(({ dir, color, label, lcolor }) => {
    const len = label && label !== 'S' && label !== 'W' ? 1.0 : 0.6;
    compassScene.add(new THREE.ArrowHelper(dir, O, len, color, len * 0.3, len * 0.18));
    if (label) {
      const sp = makeLabel(label, lcolor, 28);
      sp.scale.set(3.5, 0.9, 1);
      sp.position.copy(dir).multiplyScalar(len + 0.55);
      compassScene.add(sp);
    }
  });

  function resize() {
    const w = wrap.clientWidth, h = wrap.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);
  resize();

  const _camDir = new THREE.Vector3();
  (function animate() {
    requestAnimationFrame(animate);
    controls.update();

    // Advance sun if playing
    if (sunPlaying) {
      sunMinute += sunSpeed;
      if (sunMinute > 1140) sunMinute = 360;  // wrap sunset→sunrise
      document.getElementById('sun-slider').value = sunMinute;
      updateSunPosition();
    }

    const W = renderer.domElement.width, H = renderer.domElement.height;
    // Main scene
    renderer.setViewport(0, 0, W, H);
    renderer.setScissor(0, 0, W, H);
    renderer.setScissorTest(false);
    renderer.clear();
    renderer.render(scene, camera);

    // Compass inset – bottom-left, 100×100 CSS px
    const dpr = renderer.getPixelRatio();
    const cs = Math.round(100 * dpr), cm = Math.round(10 * dpr);
    renderer.setViewport(cm, cm, cs, cs);
    renderer.setScissor(cm, cm, cs, cs);
    renderer.setScissorTest(true);
    camera.getWorldDirection(_camDir);
    compassCam.position.copy(_camDir).negate().multiplyScalar(4);
    compassCam.up.copy(camera.up);
    compassCam.lookAt(O);
    renderer.clearDepth();
    renderer.render(compassScene, compassCam);
    renderer.setScissorTest(false);
  })();
}

// ── Sun controls ─────────────────────────────────────────────────────────
function setSunMinute(m) {
  sunMinute = m;
  document.getElementById('sun-slider').value = m;
  updateSunPosition();
}

function updateSunPosition() {
  const h = sunMinute / 60;  // hours (0–24)
  const timeLabel = `${String(Math.floor(h) % 24).padStart(2,'0')}:${String(Math.floor(sunMinute % 60)).padStart(2,'0')}`;
  document.getElementById('sun-time').textContent = timeLabel;

  // Realistic solar arc for Los Angeles (34.05°N, 118.25°W)
  // Declination based on current date for seasonal accuracy
  const lat = 34.05 * Math.PI / 180;
  const now = new Date();
  const dayOfYear = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);
  const decl = -23.44 * Math.cos(2 * Math.PI * (dayOfYear + 10) / 365) * Math.PI / 180;
  const hourAngleDeg = (h - 12) * 15;
  const ha = hourAngleDeg * Math.PI / 180;

  // Solar elevation: sin(elev) = sin(lat)*sin(decl) + cos(lat)*cos(decl)*cos(ha)
  const sinElev = Math.sin(lat) * Math.sin(decl) + Math.cos(lat) * Math.cos(decl) * Math.cos(ha);
  const elevRad = Math.asin(Math.max(-0.1, Math.min(1, sinElev)));
  const elevDeg = elevRad * 180 / Math.PI;

  // Solar azimuth: measured from South, positive=West, negative=East
  const cosElev = Math.cos(elevRad);
  const sinAz = cosElev > 0.01 ? (Math.cos(decl) * Math.sin(ha)) / cosElev : 0;
  const cosAz = cosElev > 0.01 ? (Math.sin(lat) * sinElev - Math.sin(decl)) / (Math.cos(lat) * cosElev) : 1;
  const azRad = Math.atan2(sinAz, cosAz);  // 0=South, +West, -East

  // Three.js coords: +X=East, +Z=South, -Z=North
  const dist = 250;
  const sy = dist * Math.sin(Math.max(elevRad, -0.05));
  const horiz = dist * Math.cos(Math.max(elevRad, -0.05));
  const sx = -horiz * Math.sin(azRad);  // azRad from South: -East, +West → flip for +X=East
  const sz = horiz * Math.cos(azRad);   // South = +Z

  if (sunLight) {
    sunLight.position.set(sx, Math.max(sy, 2), sz);
    sunLight.target.position.set(0, 0, 0);
    // Dim when below horizon
    const aboveHorizon = elevDeg > 0;
    sunLight.intensity = aboveHorizon ? 1.8 : 0.0;
    sunLight.color.setHex(elevDeg > 20 ? 0xfff4d6 : elevDeg > 5 ? 0xffcc66 : 0xff8833);
  }
  if (sunSphere) {
    sunSphere.position.set(sx, Math.max(sy, 2), sz);
    sunSphere.visible = elevDeg > -5;
    sunSphere.material.color.setHex(elevDeg > 20 ? 0xFFDD44 : elevDeg > 5 ? 0xFFAA22 : 0xFF6600);
  }
  if (sunGlow) {
    sunGlow.position.set(sx, Math.max(sy, 2), sz);
    sunGlow.visible = elevDeg > -5;
  }

  // Update scene background to reflect time of day
  const dayFactor = Math.max(0, Math.min(1, elevDeg / 30));
  const bgR = 0.16 + dayFactor * 0.35;
  const bgG = 0.20 + dayFactor * 0.40;
  const bgB = 0.27 + dayFactor * 0.45;
  if (scene) {
    scene.background.setRGB(bgR, bgG, bgB);
    if (scene.fog) scene.fog.color.setRGB(bgR, bgG, bgB);
  }
}

window.setSunMinute = setSunMinute;

// ── Layer visibility ─────────────────────────────────────────────────────
const layerVisible = { extwall:true, intwall:true, roof:true, slab:true, window:true, skylight:true, door:true, zone:true, label:true };
const floorVisible = {};

window.toggleLayer = function(el) {
  const layer = el.dataset.layer;
  layerVisible[layer] = !layerVisible[layer];
  el.classList.toggle('active', layerVisible[layer]);
  applyVisibility();
};

window.toggleFloor = function(el) {
  const fl = parseInt(el.dataset.floor);
  floorVisible[fl] = !floorVisible[fl];
  el.classList.toggle('active', floorVisible[fl]);
  applyVisibility();
};

function applyVisibility() {
  if (!buildingGroup) return;
  buildingGroup.traverse(child => {
    if (!child.userData) return;
    let vis = true;
    // Check layer visibility
    if (child.userData.layer && layerVisible[child.userData.layer] === false) vis = false;
    // Check floor visibility
    if (child.userData.floor != null && floorVisible[child.userData.floor] === false) vis = false;
    child.visible = vis;
  });
}

window.toggleSunPlay = function() {
  sunPlaying = !sunPlaying;
  const btn = document.getElementById('sun-play');
  btn.textContent = sunPlaying ? '\u23F8' : '\u25B6';
  btn.classList.toggle('active', sunPlaying);
};

// ── Colors ────────────────────────────────────────────────────────────────
function zoneColor(c) {
  const t = (c||'').toLowerCase();
  if (t.includes('unconditioned')) return 0x6e7681;
  if (t.includes('plenum')) return 0x9B59B6;
  if (t.includes('heated only')) return 0xFF8C42;
  if (t.includes('cooled only')) return 0x42C5FF;
  if (t.includes('semi')) return 0xFFCC42;
  return 0x4A90E2;
}
function surfColor(t) {
  const s = (t||'').toLowerCase();
  if (s.includes('roof')) return 0xC85250;
  if (s.includes('interior') || s.includes('demising')) return 0x9E9E9E;
  if (s.includes('slab') || s.includes('grade')) return 0x607D8B;
  if (s.includes('underground')) return 0x5D4037;
  if (s.includes('exposed') || s.includes('raised')) return 0x795548;
  if (s.includes('ceiling')) return 0xE57373;
  return 0xE8C840;  // exterior wall — yellow (matches AutoCAD T24-WALL)
}
function openColor(t) {
  const s = (t||'').toLowerCase();
  if (s.includes('sky')) return 0xCC44CC;   // magenta (matches AutoCAD T24-SKY)
  if (s.includes('door')) return 0xE04040;  // red (matches AutoCAD T24-DOOR)
  return 0x4488EE;  // window — blue (matches AutoCAD T24-WIN)
}

// ── Text sprite ───────────────────────────────────────────────────────────
function makeLabel(text, color = '#e6edf3', fontSize = 22) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 48;
  const ctx = c.getContext('2d');
  ctx.font = `bold ${fontSize}px system-ui`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 24);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(12, 2.5, 1);
  return sp;
}

function makeDimLabel(text, color = '#ffffff', fontSize = 18) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 40;
  const ctx = c.getContext('2d');
  // Background pill
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  const tw = ctx.measureText ? 0 : 0;
  ctx.font = `bold ${fontSize}px system-ui`;
  const m = ctx.measureText(text);
  const pw = Math.min(m.width + 16, 250), ph = 28;
  const rx = (256 - pw) / 2, ry = (40 - ph) / 2;
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(rx, ry, pw, ph, 6); ctx.fill(); }
  else { ctx.fillRect(rx, ry, pw, ph); }
  // Text
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 20);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(8, 1.8, 1);
  return sp;
}

// ── Layout (adjacency-aware, multi-story) ─────────────────────────────────
function layoutZones(zones, walls) {
  const positions = {};
  const zoneById = Object.fromEntries(zones.map(z => [z.id, z]));

  // Group by floor
  const floors = {};
  zones.forEach(z => {
    const fl = z.floor || 1;
    (floors[fl] = floors[fl] || []).push(z);
  });

  // Compute base Y elevation for each floor (cumulative ceiling heights)
  const sortedFloors = Object.keys(floors).map(Number).sort((a,b)=>a-b);
  const floorBaseY = {};
  let cumY = 0;
  sortedFloors.forEach(fl => {
    floorBaseY[fl] = cumY;
    const maxH = Math.max(...floors[fl].map(z => z.height || 9));
    cumY += maxH;
  });

  // Interior wall edges within same floor only
  const edges = [];
  (walls || []).forEach(w => {
    const st = (w.type || '').toLowerCase();
    if ((st.includes('interior') || st.includes('demising')) && w.adj_zone && w.azimuth != null) {
      const fromZone = zoneById[w.zone_id];
      const toZone = zoneById[w.adj_zone];
      if (fromZone && toZone && (fromZone.floor||1) === (toZone.floor||1))
        edges.push({ from: w.zone_id, to: w.adj_zone, azimuth: w.azimuth });
    }
  });

  // BFS per floor: place connected zones snapped together
  sortedFloors.forEach(fl => {
    const flZones = floors[fl];
    const placed = new Set();
    if (!flZones.length) return;

    positions[flZones[0].id] = { x: 0, z: 0, side: Math.sqrt(Math.max(flZones[0].area, 1)), y: floorBaseY[fl] };
    placed.add(flZones[0].id);
    const queue = [flZones[0].id];

    while (queue.length) {
      const zid = queue.shift();
      const zpos = positions[zid];
      edges.forEach(e => {
        if (e.from !== zid || placed.has(e.to) || !zoneById[e.to]) return;
        const az = e.azimuth * Math.PI / 180;
        const nx = Math.sin(az), nz = -Math.cos(az);
        const adjSide = Math.sqrt(Math.max(zoneById[e.to].area, 1));
        positions[e.to] = {
          x: zpos.x + nx * (zpos.side / 2 + adjSide / 2),
          z: zpos.z + nz * (zpos.side / 2 + adjSide / 2),
          side: adjSide, y: floorBaseY[fl]
        };
        placed.add(e.to);
        queue.push(e.to);
      });
    }

    // Grid fallback for unconnected zones on this floor
    const GAP = 18;
    const maxSide = Math.max(...flZones.map(z => Math.sqrt(Math.max(z.area, 1))), 10);
    const cell = maxSide + GAP;
    let gi = 0, maxX = 0;
    placed.forEach(id => { if (positions[id]) maxX = Math.max(maxX, positions[id].x + positions[id].side / 2); });
    flZones.forEach(z => {
      if (placed.has(z.id)) return;
      const side = Math.sqrt(Math.max(z.area, 1));
      positions[z.id] = { x: maxX + GAP + (gi % 3) * cell, z: Math.floor(gi / 3) * cell, side, y: floorBaseY[fl] };
      gi++;
    });
  });

  return positions;
}

// ── Build scene ───────────────────────────────────────────────────────────
function renderBuilding(data) {
  if (buildingGroup) scene.remove(buildingGroup);
  buildingGroup = new THREE.Group();
  selectableObjects = [];

  const pos = layoutZones(data.zones, data.walls);
  const zoneFloor = {};  // map zone_id → floor number
  data.zones.forEach(z => { zoneFloor[z.id] = z.floor || 1; });
  const wallsByZone = {};
  data.walls.forEach(w => {
    (wallsByZone[w.zone_id] = wallsByZone[w.zone_id] || []).push(w);
  });
  const openByWall = {};
  data.openings.forEach(o => {
    (openByWall[o.wall_id] = openByWall[o.wall_id] || []).push(o);
  });

  data.zones.forEach(zone => {
    const p = pos[zone.id]; if (!p) return;
    const yBase = p.y || 0;
    let h = zone.height;

    // Use real CAD geometry if available, else square approximation
    const geo_z = geometryData && geometryData.zones && geometryData.zones[zone.id];
    if (geo_z && geo_z.ceiling_ht_ft) h = geo_z.ceiling_ht_ft;
    let x, z, side;

    if (geo_z) {
      // Real polygon footprint from CAD
      const verts = geo_z.vertices_ft;
      const cx = geo_z.centroid_ft ? geo_z.centroid_ft[0] : verts.reduce((s,v)=>s+v[0],0)/verts.length;
      const cy = geo_z.centroid_ft ? geo_z.centroid_ft[1] : verts.reduce((s,v)=>s+v[1],0)/verts.length;
      x = cx; z = -cy;  // Y=North maps to -Z in Three.js
      side = Math.sqrt(Math.max(zone.area, 1));

      const shape = new THREE.Shape();
      shape.moveTo(verts[0][0] - cx, verts[0][1] - cy);
      for (let i = 1; i < verts.length; i++)
        shape.lineTo(verts[i][0] - cx, verts[i][1] - cy);
      shape.closePath();

      const extG = new THREE.ExtrudeGeometry(shape, { depth: h, bevelEnabled: false });
      // Rotate so extrusion goes up (Y) instead of Z
      extG.rotateX(-Math.PI / 2);

      const fillM = new THREE.MeshLambertMaterial({
        color: zoneColor(zone.cond_type), transparent: true, opacity: 0.07, depthWrite: false
      });
      const fill = new THREE.Mesh(extG, fillM);
      fill.position.set(cx, yBase, -cy);
      fill.userData = { type: 'zone', id: zone.id, data: zone, layer: 'zone' };
      buildingGroup.add(fill);
      selectableObjects.push(fill);

      const wire = new THREE.LineSegments(
        new THREE.EdgesGeometry(extG),
        new THREE.LineBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.6 })
      );
      wire.position.set(cx, yBase, -cy);
      wire.userData = { layer: 'zone', zoneId: zone.id };
      buildingGroup.add(wire);
    } else {
      // Square approximation
      ({ x, z, side } = p);
      const boxG = new THREE.BoxGeometry(side, h, side);
      const boxM = new THREE.MeshLambertMaterial({
        color: zoneColor(zone.cond_type), transparent: true, opacity: 0.07, depthWrite: false
      });
      const box = new THREE.Mesh(boxG, boxM);
      box.position.set(x, yBase + h / 2, z);
      box.userData = { type: 'zone', id: zone.id, data: zone, layer: 'zone' };
      buildingGroup.add(box);
      selectableObjects.push(box);

      const wire = new THREE.LineSegments(
        new THREE.EdgesGeometry(boxG),
        new THREE.LineBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.6 })
      );
      wire.position.set(x, yBase + h / 2, z);
      wire.userData = { layer: 'zone', zoneId: zone.id };
      buildingGroup.add(wire);
    }

    // Label
    const lbl = makeLabel(zone.name || zone.id);
    lbl.position.set(x, yBase + h + 8, z);
    lbl.userData = { layer: 'label', zoneId: zone.id };
    buildingGroup.add(lbl);

    // Walls
    (wallsByZone[zone.id] || []).forEach(wall => {
      const surfType = (wall.type || '').toLowerCase();
      const isHoriz = /roof|slab|floor|ceiling/.test(surfType);

      if (isHoriz) {
        const isRoof = surfType.includes('roof');
        const isSlab = surfType.includes('slab');
        if (!isRoof && !isSlab) return;
        const yPos = yBase + (isRoof ? h + 0.08 : 0.08);

        let horizMesh;
        if (geo_z && geo_z.vertices_ft) {
          // Polygon shape from CAD geometry
          const verts = geo_z.vertices_ft;
          const cx = geo_z.centroid_ft ? geo_z.centroid_ft[0] : verts.reduce((s,v)=>s+v[0],0)/verts.length;
          const cy = geo_z.centroid_ft ? geo_z.centroid_ft[1] : verts.reduce((s,v)=>s+v[1],0)/verts.length;
          const roofShape = new THREE.Shape();
          roofShape.moveTo(verts[0][0] - cx, verts[0][1] - cy);
          for (let vi = 1; vi < verts.length; vi++)
            roofShape.lineTo(verts[vi][0] - cx, verts[vi][1] - cy);
          roofShape.closePath();

          // Scale for partial roofs (roof area < zone area)
          const scaleFactor = zone.area > 0 ? Math.sqrt(Math.min(wall.area / zone.area, 1.0)) : 1.0;
          const shapeG = new THREE.ShapeGeometry(roofShape);
          shapeG.rotateX(-Math.PI / 2);
          if (scaleFactor < 0.999) shapeG.scale(scaleFactor, 1, scaleFactor);

          const planeM = new THREE.MeshLambertMaterial({
            color: surfColor(wall.type), side: THREE.DoubleSide, transparent: true, opacity: 0.88
          });
          horizMesh = new THREE.Mesh(shapeG, planeM);
          horizMesh.position.set(cx, yPos, -cy);
        } else {
          // Square fallback
          const wSide = Math.min(Math.sqrt(Math.max(wall.area, 1)), side * 0.96);
          const planeG = new THREE.PlaneGeometry(wSide, wSide);
          const planeM = new THREE.MeshLambertMaterial({
            color: surfColor(wall.type), side: THREE.DoubleSide, transparent: true, opacity: 0.88
          });
          horizMesh = new THREE.Mesh(planeG, planeM);
          horizMesh.rotation.x = -Math.PI / 2;
          horizMesh.position.set(x, yPos, z);
        }
        horizMesh.castShadow = true;
        horizMesh.receiveShadow = true;
        horizMesh.userData = { type: 'wall', id: wall.id, data: wall, layer: isRoof ? 'roof' : 'slab' };
        buildingGroup.add(horizMesh);
        selectableObjects.push(horizMesh);

        // Area label on horiz surface
        if (wall.area > 0) {
          const hLabel = makeDimLabel(`${Math.round(wall.area)} sf`, isRoof ? '#ffcccc' : '#aaccee');
          const hlx = horizMesh.position.x || x;
          const hlz = horizMesh.position.z || z;
          hLabel.position.set(hlx, yPos + 1.5, hlz);
          hLabel.userData = { layer: isRoof ? 'roof' : 'slab', zoneId: zone.id };
          buildingGroup.add(hLabel);
        }

        // Skylights on roof
        if (isRoof) {
          const skyY = yBase + h + 0.18;
          const geoOpenings = geometryData && geometryData.openings;
          (openByWall[wall.id] || []).forEach(o => {
            const oSide = Math.sqrt(Math.max(o.area, 0.5));
            const og = new THREE.PlaneGeometry(oSide, oSide);
            const om = new THREE.MeshLambertMaterial({
              color: openColor(o.type), transparent: true, opacity: 0.7, side: THREE.DoubleSide
            });
            const om2 = new THREE.Mesh(og, om);
            om2.rotation.x = -Math.PI / 2;
            const geo_o = geoOpenings && geoOpenings[o.id];
            if (geo_o && geo_o.position_ft) {
              om2.position.set(geo_o.position_ft[0], skyY, -geo_o.position_ft[1]);
            } else {
              const skyCx = geo_z ? (geo_z.centroid_ft ? geo_z.centroid_ft[0] : x) : x;
              const skyCz = geo_z ? -(geo_z.centroid_ft ? geo_z.centroid_ft[1] : -z) : z;
              om2.position.set(skyCx, skyY, skyCz);
            }
            om2.userData = { type: 'opening', id: o.id, data: o, layer: 'skylight' };
            buildingGroup.add(om2);
            selectableObjects.push(om2);
            // Skylight area label
            if (o.area > 0) {
              const sLbl = makeDimLabel(`${Math.round(o.area)} sf`, '#ee88ee');
              sLbl.position.set(om2.position.x, skyY + 1.5, om2.position.z);
              sLbl.userData = { layer: 'skylight', zoneId: zone.id };
              buildingGroup.add(sLbl);
            }
          });
        }
      } else {
        // Vertical wall — use real wall segment if geometry available
        const geo_w = geometryData && geometryData.walls && geometryData.walls[wall.id];
        let wx, wz, wallW, wallRot;
        let wallH = h;
        const wallD = 0.5;  // wall thickness in ft
        // Normal direction (outward from wall face)
        let nx, nzDir;

        if (geo_w) {
          const p1 = geo_w.p1_ft, p2 = geo_w.p2_ft;
          wx = (p1[0] + p2[0]) / 2;
          wz = -(p1[1] + p2[1]) / 2;
          wallW = Math.sqrt((p2[0]-p1[0])**2 + (p2[1]-p1[1])**2);
          // Wall direction in Three.js: (dx, 0, -dy)
          const dx = p2[0] - p1[0];
          const dz = -(p2[1] - p1[1]);
          // BoxGeometry width = local X. After rotation.y=θ, local X → (cosθ, 0, -sinθ)
          // Align with (dx, dz): cosθ=dx/len, -sinθ=dz/len → θ=atan2(-dz, dx)
          wallRot = Math.atan2(-dz, dx);
          // Normal (outward) from wall azimuth
          const azRad = (wall.azimuth || 0) * Math.PI / 180;
          nx = Math.sin(azRad);
          nzDir = -Math.cos(azRad);
        } else if (geo_z && geo_z.vertices_ft) {
          // No wall geometry — find the zone boundary segment matching this wall's azimuth
          const az = wall.azimuth * Math.PI / 180;
          nx = Math.sin(az); nzDir = -Math.cos(az);
          const verts = geo_z.vertices_ft;
          let bestSeg = null, bestAngleDiff = Infinity;
          for (let vi = 0; vi < verts.length; vi++) {
            const vA = verts[vi], vB = verts[(vi + 1) % verts.length];
            const edx = vB[0] - vA[0], edy = vB[1] - vA[1];
            const eLen = Math.sqrt(edx * edx + edy * edy);
            if (eLen < 0.5) continue;
            // Edge normal (outward, assuming CCW winding): rotate edge 90° CW → (edy, -edx)
            const enx = edy / eLen, eny = -edx / eLen;
            // Convert edge normal to azimuth: atan2(enx, eny) in CAD coords
            let edgeAz = Math.atan2(enx, eny);
            if (edgeAz < 0) edgeAz += 2 * Math.PI;
            let wallAz = az; if (wallAz < 0) wallAz += 2 * Math.PI;
            let diff = Math.abs(edgeAz - wallAz);
            if (diff > Math.PI) diff = 2 * Math.PI - diff;
            // Also try opposite normal (CW winding)
            let edgeAz2 = edgeAz + Math.PI; if (edgeAz2 >= 2 * Math.PI) edgeAz2 -= 2 * Math.PI;
            let diff2 = Math.abs(edgeAz2 - wallAz);
            if (diff2 > Math.PI) diff2 = 2 * Math.PI - diff2;
            const bestDiff = Math.min(diff, diff2);
            if (bestDiff < bestAngleDiff) {
              bestAngleDiff = bestDiff;
              bestSeg = { p1: vA, p2: vB, len: eLen };
            }
          }
          if (bestSeg && bestAngleDiff < 0.35) {  // ~20° tolerance
            const sp1 = bestSeg.p1, sp2 = bestSeg.p2;
            wx = (sp1[0] + sp2[0]) / 2;
            wz = -(sp1[1] + sp2[1]) / 2;
            wallW = bestSeg.len;
            const sdx = sp2[0] - sp1[0], sdz = -(sp2[1] - sp1[1]);
            wallRot = Math.atan2(-sdz, sdx);
          } else {
            // No matching edge — fallback to centroid offset
            wallRot = -az;
            wallW = Math.min(wall.area / Math.max(wallH, 1), side * 0.98);
            const off = side / 2 + 0.15;
            wx = x + nx * off; wz = z + nzDir * off;
          }
        } else {
          const az = wall.azimuth * Math.PI / 180;
          nx = Math.sin(az); nzDir = -Math.cos(az);
          wallRot = -az;
          wallW = Math.min(wall.area / Math.max(wallH, 1), side * 0.98);
          const off = side / 2 + 0.15;
          wx = x + nx * off; wz = z + nzDir * off;
        }

        const wallG = new THREE.BoxGeometry(wallW, wallH, wallD);
        const wallM = new THREE.MeshLambertMaterial({
          color: surfColor(wall.type), transparent: true, opacity: 0.88, side: THREE.DoubleSide
        });
        const wallMesh = new THREE.Mesh(wallG, wallM);
        wallMesh.position.set(wx, yBase + wallH / 2, wz);
        wallMesh.rotation.y = wallRot;
        wallMesh.castShadow = true;
        wallMesh.receiveShadow = true;
        const wLayer = surfType.includes('interior') || surfType.includes('demising') ? 'intwall' : 'extwall';
        wallMesh.userData = { type: 'wall', id: wall.id, data: wall, layer: wLayer };
        buildingGroup.add(wallMesh);
        selectableObjects.push(wallMesh);

        // Wall area + height label
        if (wall.area > 0) {
          const wlText = `${Math.round(wall.area)} sf  |  ${wallH.toFixed(1)}' h`;
          const wlColor = wLayer === 'extwall' ? '#ffe066' : '#cccccc';
          const wLbl = makeDimLabel(wlText, wlColor);
          const fwdLbl = wallD * 0.5 + 0.5;
          wLbl.position.set(wx + nx * fwdLbl, yBase + wallH + 1.5, wz + nzDir * fwdLbl);
          wLbl.userData = { layer: wLayer, zoneId: zone.id };
          buildingGroup.add(wLbl);
        }

        // Windows/doors on wall — use real coordinates when available
        const openD = 0.15;  // thin slab in front of wall
        const geoOpenings = geometryData && geometryData.openings;
        (openByWall[wall.id] || []).forEach((o, oi) => {
          // Size from actual area with realistic aspect ratio
          const oArea = Math.max(o.area, 0.5);
          const isDoor = (o.type || '').toLowerCase().includes('door');
          const aspect = isDoor ? 0.43 : 1.5;  // w/h ratio: doors tall, windows wide
          let ow = Math.sqrt(oArea * aspect);
          let oh = oArea / ow;
          // Clamp to wall bounds but preserve area
          if (ow > wallW * 0.9) { ow = wallW * 0.9; oh = oArea / ow; }
          if (oh > wallH * 0.85) { oh = wallH * 0.85; ow = oArea / oh; }
          const og = new THREE.BoxGeometry(ow, oh, openD);
          const om = new THREE.MeshLambertMaterial({
            color: openColor(o.type), transparent: true, opacity: 0.65, side: THREE.DoubleSide
          });
          const mesh = new THREE.Mesh(og, om);

          const geo_o = geoOpenings && geoOpenings[o.id];
          let ox, oz, oRot = wallRot, onx = nx, onz = nzDir;
          if (geo_o && geo_o.position_ft && geo_z && geo_z.vertices_ft) {
            // Real CAD position — find nearest zone edge for rotation
            ox = geo_o.position_ft[0];
            oz = -geo_o.position_ft[1];
            const oVerts = geo_z.vertices_ft;
            let bestDist = Infinity;
            for (let vi = 0; vi < oVerts.length; vi++) {
              const vA = oVerts[vi], vB = oVerts[(vi + 1) % oVerts.length];
              const edx = vB[0] - vA[0], edy = vB[1] - vA[1];
              const eLen2 = edx * edx + edy * edy;
              if (eLen2 < 0.25) continue;
              // Project opening position onto edge segment
              const t = Math.max(0, Math.min(1,
                ((geo_o.position_ft[0] - vA[0]) * edx + (geo_o.position_ft[1] - vA[1]) * edy) / eLen2));
              const cx = vA[0] + t * edx, cy = vA[1] + t * edy;
              const d = Math.sqrt((geo_o.position_ft[0] - cx) ** 2 + (geo_o.position_ft[1] - cy) ** 2);
              if (d < bestDist) {
                bestDist = d;
                const sdz = -(vB[1] - vA[1]);
                const sdx2 = vB[0] - vA[0];
                oRot = Math.atan2(-sdz, sdx2);
                // Normal from wall azimuth or perpendicular to edge
                const eLen = Math.sqrt(eLen2);
                onx = -sdz / eLen;   // perpendicular X
                onz = sdx2 / eLen;   // perpendicular Z (in Three.js)
              }
            }
          } else if (geo_o && geo_o.position_ft) {
            ox = geo_o.position_ft[0];
            oz = -geo_o.position_ft[1];
          } else {
            // Fallback: evenly distribute along wall
            const step = wallW / (openByWall[wall.id].length + 1);
            const localX = (oi + 1) * step - wallW / 2;
            const wallDirX = Math.sin(wallRot), wallDirZ = Math.cos(wallRot);
            ox = wx + wallDirX * localX;
            oz = wz + wallDirZ * localX;
          }
          // Push slightly in front of wall face
          const fwd = wallD * 0.5 + openD * 0.5 + 0.05;
          mesh.position.set(
            ox + onx * fwd,
            yBase + wallH * 0.5,
            oz + onz * fwd
          );
          mesh.rotation.y = oRot;
          const oLayer = isDoor ? 'door' : 'window';
          mesh.userData = { type: 'opening', id: o.id, data: o, layer: oLayer };
          buildingGroup.add(mesh);
          selectableObjects.push(mesh);

          // Opening area label
          if (o.area > 0) {
            const oLblColor = isDoor ? '#ff9999' : '#99ccff';
            const oLbl = makeDimLabel(`${Math.round(o.area)} sf`, oLblColor);
            oLbl.position.set(
              ox + onx * (fwd + 0.5),
              yBase + wallH * 0.5 + oh * 0.5 + 1.2,
              oz + onz * (fwd + 0.5)
            );
            oLbl.userData = { layer: oLayer, zoneId: zone.id };
            buildingGroup.add(oLbl);
          }
        });
      }
    });
  });


  // Tag all objects with their floor number for floor toggle
  buildingGroup.traverse(child => {
    if (!child.userData) return;
    const ud = child.userData;
    // Zone objects: use zone's floor directly
    if (ud.data && ud.data.floor != null) {
      ud.floor = ud.data.floor || 1;
    }
    // Wall/opening objects: use parent zone's floor
    else if (ud.data && ud.data.zone_id && zoneFloor[ud.data.zone_id]) {
      ud.floor = zoneFloor[ud.data.zone_id];
    }
    // Wire/label children: inherit from zone id
    else if (ud.id && zoneFloor[ud.id]) {
      ud.floor = zoneFloor[ud.id];
    }
    // Fallback: try to find zone from parent meshes
    if (ud.floor == null && ud.zoneId) ud.floor = zoneFloor[ud.zoneId] || 1;
  });

  // Build floor toggle UI
  const allFloors = [...new Set(data.zones.map(z => z.floor || 1))].sort((a,b) => a - b);
  const ftDiv = document.getElementById('floor-toggles');
  ftDiv.innerHTML = allFloors.length > 1
    ? allFloors.map(fl => {
        floorVisible[fl] = floorVisible[fl] !== false;  // default on
        return `<div class="leg-item active" data-floor="${fl}" onclick="toggleFloor(this)"><span class="dot" style="background:#78909C"></span>Floor ${fl}</div>`;
      }).join('')
    : '';

  scene.add(buildingGroup);
  fitCamera(data.zones, pos);
}

function fitCamera(zones, positions) {
  let minX=Infinity, maxX=-Infinity, minZ=Infinity, maxZ=-Infinity, totalH=0;
  zones.forEach(z => {
    const p = positions[z.id]; if (!p) return;
    const s = p.side || Math.sqrt(Math.max(z.area,1));
    minX = Math.min(minX, p.x - s/2); maxX = Math.max(maxX, p.x + s/2);
    minZ = Math.min(minZ, p.z - s/2); maxZ = Math.max(maxZ, p.z + s/2);
    totalH = Math.max(totalH, (p.y||0) + z.height);
  });
  const cx = (minX+maxX)/2, cz = (minZ+maxZ)/2;
  const span = Math.max(maxX-minX, maxZ-minZ, 20);
  camera.position.set(cx + span*0.6, span*0.7 + totalH*0.3, cz + span*1.0);
  controls.target.set(cx, totalH/2, cz);
  controls.update();
}

// ── Compass canvas ─────────────────────────────────────────────────────────
function drawCompass(frontOrient) {
  const cv = document.getElementById('compass');
  const ctx = cv.getContext('2d');
  const s = cv.width;
  ctx.clearRect(0,0,s,s);
  ctx.strokeStyle = '#30363d'; ctx.fillStyle = '#161b22';
  ctx.beginPath(); ctx.arc(s/2,s/2,s/2-1,0,Math.PI*2); ctx.fill(); ctx.stroke();
  const dirs = [['N',s/2,8,'#f85149'],['S',s/2,s-2,'#6e7681'],['E',s-3,s/2+4,'#6e7681'],['W',3,s/2+4,'#6e7681']];
  dirs.forEach(([t,x,y,c]) => {
    ctx.fillStyle=c; ctx.font='bold 9px system-ui'; ctx.textAlign='center'; ctx.fillText(t,x,y);
  });
}

// ── Click selection ────────────────────────────────────────────────────────
function onCanvasClick(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(selectableObjects);
  if (hits.length) {
    const obj = hits[0].object;
    selectObject(obj.userData.id, obj.userData.type, obj.userData.data);
  } else {
    clearSelection();
  }
}

function selectObject(id, type, data) {
  // Clear previous highlight
  if (selectedMesh) {
    if (selectedMesh.material && selectedMesh.material.emissive)
      selectedMesh.material.emissive.setHex(0x000000);
    selectedMesh = null;
  }
  // Highlight the clicked mesh
  for (const obj of selectableObjects) {
    if (obj.userData.id === id && obj.userData.type !== 'zone') {
      if (obj.material && obj.material.emissive) {
        obj.material.emissive.setHex(0x2255aa);
        selectedMesh = obj;
      }
      break;
    }
  }
  selectedId = id;
  // Highlight in table
  document.querySelectorAll('.data-table tr.selected').forEach(r => r.classList.remove('selected'));
  document.querySelectorAll(`[data-row-id="${id}"]`).forEach(r => r.classList.add('selected'));

  // Show info panel
  const panel = document.getElementById('sel-info');
  document.getElementById('sel-title').textContent = `${type.toUpperCase()}: ${data.name || id}`;
  const tbl = document.getElementById('sel-table');
  const skip = ['_row','id','name','azimuth'];
  tbl.innerHTML = Object.entries(data)
    .filter(([k]) => !skip.includes(k) && k[0] !== '_')
    .map(([k,v]) => `<tr><td>${k.replace(/_/g,' ')}</td><td>${v ?? '—'}</td></tr>`)
    .join('');
  panel.style.display = 'block';

  // Switch to appropriate tab
  const tabMap = { zone:'zones', wall:'walls', opening:'openings' };
  if (tabMap[type]) showTab(tabMap[type]);
}

function clearSelection() {
  selectedId = null;
  document.getElementById('sel-info').style.display = 'none';
  document.querySelectorAll('.data-table tr.selected').forEach(r => r.classList.remove('selected'));
}

// ── API helpers ────────────────────────────────────────────────────────────
async function api(path, opts) {
  const r = await fetch(path, opts);
  return r.json();
}

function status(msg, cls='') {
  const el = document.getElementById('status-pill');
  el.textContent = msg; el.className = cls;
}

// ── Data loading ───────────────────────────────────────────────────────────
window.browseFile = async function() {
  status('Opening file picker…', 'busy');
  try {
    const r = await api('/api/browse');
    if (r.error) { status(r.error, 'err'); return; }
    if (!r.file) { status('Cancelled', ''); return; }
    // Add to dropdown if not already there
    const sel = document.getElementById('file-select');
    const fname = r.file;
    let found = false;
    for (const opt of sel.options) { if (opt.value === fname) { found = true; break; } }
    if (!found) {
      const opt = document.createElement('option');
      opt.value = fname; opt.textContent = fname;
      sel.appendChild(opt);
    }
    sel.value = fname;
    currentFile = fname;
    await reloadData();
  } catch(e) { status('Browse failed', 'err'); }
};

window.importJson = async function() {
  status('Select a T24 JSON file…', 'busy');
  try {
    const r = await api('/api/browse-jsons');
    if (r.error) { status(r.error, 'err'); return; }
    if (!r.files || r.files.length === 0) { status('Cancelled', ''); return; }
    // Prompt for floor number for each file
    const floor = prompt('Floor number for this import:', '1');
    if (floor === null) { status('Cancelled', ''); return; }
    status(`Converting ${r.files.length} file(s)…`, 'busy');
    const m = await api('/api/import-json', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ files: r.files, floor: parseInt(floor) || 1 })
    });
    if (m.error) { status('Import failed: ' + m.error, 'err'); return; }
    const sel = document.getElementById('file-select');
    const fname = m.file;
    let found = false;
    for (const opt of sel.options) { if (opt.value === fname) { found = true; break; } }
    if (!found) {
      const opt = document.createElement('option');
      opt.value = fname; opt.textContent = fname;
      sel.appendChild(opt);
    }
    sel.value = fname;
    currentFile = fname;
    await reloadData();
    status(`Imported ${r.files.length} file(s) as Floor ${floor}`, 'ok');
  } catch(e) { status('Import failed: ' + e, 'err'); }
};

window.reloadData = async function() {
  if (!currentFile) return;
  status('Loading…', 'busy');
  try {
    const [d, geo] = await Promise.all([
      api(`/api/data?file=${encodeURIComponent(currentFile)}`),
      api(`/api/geometry?file=${encodeURIComponent(currentFile)}`),
    ]);
    if (d.error) { status('Error: ' + d.error, 'err'); return; }
    buildingData = d;
    geometryData = geo || null;
    lastMtime = d._mtime;
    renderBuilding(d);
    renderTables(d);
    const geoNote = geometryData ? ' (CAD geometry)' : '';
    status(`Loaded ${d.zones.length} zones, ${d.walls.length} walls, ${d.openings.length} openings${geoNote}`, 'ok');
  } catch(e) { status('Load failed', 'err'); }
};

async function init() {
  initThree();
  // Load file list
  const files = await api('/api/files');
  const sel = document.getElementById('file-select');
  sel.innerHTML = files.map(f => `<option value="${f}">${f}</option>`).join('');
  if (files.length) {
    currentFile = files[0];
    sel.value = currentFile;
  }
  sel.onchange = () => { currentFile = sel.value; reloadData(); };
  await reloadData();

  // Poll for external changes
  setInterval(async () => {
    if (isEditing || !currentFile) return;
    const r = await api(`/api/mtime?file=${encodeURIComponent(currentFile)}`);
    if (r.mtime && r.mtime !== lastMtime) reloadData();
  }, 2500);
}

// ── Table rendering ────────────────────────────────────────────────────────
const PROJ_FIELDS = [
  ['name','Project Name',2,2],['address','Address',3,2],
  ['climate_zone','Climate Zone',4,2],['building_type','Building Type',5,2],
  ['front_orientation','Front Orientation',6,2],['standards_version','Standards Version',7,2],
];
const ZONE_COLS = [
  ['id','Zone ID',1],['name','Zone Name',2],['area','Area (sqft)',3],
  ['height','Height (ft)',4],['cond_type','Condition Type',5],['occ_type','Occupancy Type',6],
  ['floor','Floor',7]
];
const WALL_COLS = [
  ['id','Wall ID',1],['zone_id','Zone ID',2],['name','Wall Name',3],
  ['type','Type',4],['orientation','Orientation',5],['area','Area (sqft)',6],
  ['construction','Construction',7],['adj_zone','Adj Zone',8]
];
const OPEN_COLS = [
  ['id','Opening ID',1],['wall_id','Wall ID',2],['name','Name',3],
  ['type','Type',4],['area','Area (sqft)',5],['ufactor','U-Factor',6],['shgc','SHGC',7]
];

function renderTables(d) {
  renderProjectPane(d.project);
  renderGridPane('pane-zones', d.zones, ZONE_COLS, 'Zones',
    () => ['NEW-ID','','0','9','Conditioned','','1']);
  renderGridPane('pane-walls', d.walls, WALL_COLS, 'Walls',
    () => ['NEW-WALL','','','Exterior Wall','South','0','','']);
  renderGridPane('pane-openings', d.openings, OPEN_COLS, 'Openings',
    () => ['NEW-OPEN','','','Window','0','','']);
}

function renderProjectPane(proj) {
  const pane = document.getElementById('pane-project');
  const rows = PROJ_FIELDS.map(([key,label,row,col]) => {
    const val = proj[key] || '';
    return `<tr>
      <td>${label}</td>
      <td contenteditable="false" data-row="${row}" data-col="${col}"
          onclick="editKV(this)" onblur="saveKV(this,'${key}')"
          onkeydown="kvKeydown(event,this,'${key}')">${val}</td>
    </tr>`;
  }).join('');
  pane.innerHTML = `<table class="kv-table">${rows}</table>`;
}

function renderGridPane(paneId, rows, cols, sheet, defaultValues) {
  const pane = document.getElementById(paneId);
  if (!rows.length) {
    pane.innerHTML = `<p style="color:#8b949e;padding:16px;font-size:13px">No data yet.</p>
      <button class="add-row-btn" onclick="addRow('${sheet}',${JSON.stringify(defaultValues())})">+ Add Row</button>`;
    return;
  }
  let html = `<table class="data-table"><thead><tr><th></th>${cols.map(([,h])=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
  rows.forEach(row => {
    const rid = row.id;
    const sel = selectedId === rid ? ' selected' : '';
    html += `<tr class="${sel}" data-row-id="${rid}" onclick="rowClick(event,'${rid}','${sheet.replace(/s$/,'')}')">`;
    html += `<td><button class="del-btn" onclick="deleteRow(event,'${sheet}',${row._row})">✕</button></td>`;
    cols.forEach(([field,,col]) => {
      const v = row[field] != null ? row[field] : '';
      html += `<td class="editable" data-field="${field}" data-row="${row._row}" data-col="${col}"
                   contenteditable="false"
                   onclick="editCell(event,this)"
                   onblur="saveCell(this)"
                   onkeydown="cellKeydown(event,this)">${v}</td>`;
    });
    html += '</tr>';
  });
  html += `</tbody></table><button class="add-row-btn" onclick="addRow('${sheet}',${JSON.stringify(defaultValues())})">+ Add Row</button>`;
  pane.innerHTML = html;
}

// ── Editing helpers (exposed to inline handlers) ───────────────────────────
window.editKV = function(td) {
  td.contentEditable = 'true'; td.focus();
  const r = document.createRange(); r.selectNodeContents(td);
  const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
  isEditing = true;
};
window.kvKeydown = function(e, td, key) {
  if (e.key === 'Enter') { e.preventDefault(); td.blur(); }
  if (e.key === 'Escape') { td.textContent = buildingData.project[key]||''; td.contentEditable='false'; isEditing=false; }
};
window.saveKV = async function(td, key) {
  td.contentEditable = 'false'; isEditing = false;
  const val = td.textContent.trim();
  if (val === String(buildingData.project[key]||'')) return;
  buildingData.project[key] = val;
  const row = parseInt(td.dataset.row), col = parseInt(td.dataset.col);
  await api('/api/update', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ file: currentFile, sheet:'Project', row, col, value: val }) });
  await reloadData();
};

window.editCell = function(e, td) {
  e.stopPropagation();
  td.contentEditable = 'true'; td.focus();
  const r = document.createRange(); r.selectNodeContents(td);
  const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
  isEditing = true;
};
window.cellKeydown = function(e, td) {
  if (e.key === 'Enter') { e.preventDefault(); td.blur(); }
  if (e.key === 'Escape') { td.contentEditable = 'false'; isEditing = false; td.blur(); }
};
window.saveCell = async function(td) {
  td.contentEditable = 'false'; isEditing = false;
  const val = td.textContent.trim();
  const row = parseInt(td.dataset.row), col = parseInt(td.dataset.col);
  await api('/api/update', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ file: currentFile, sheet: sheetFromPane(), row, col, value: val }) });
  await reloadData();
};

function sheetFromPane() {
  const active = document.querySelector('.tab-pane.active');
  return active ? active.id.replace('pane-','').replace(/^\w/, c => c.toUpperCase()) : 'Zones';
}

window.rowClick = function(e, id, type) {
  if (e.target.contentEditable === 'true' || e.target.classList.contains('del-btn')) return;
  const data = (buildingData[type+'s'] || buildingData.openings || []).find(r => r.id === id);
  if (data) selectObject(id, type, data);
};

window.deleteRow = async function(e, sheet, row) {
  e.stopPropagation();
  if (!confirm('Delete this row?')) return;
  await api('/api/delete_row', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ file: currentFile, sheet, row }) });
  await reloadData();
};

window.addRow = async function(sheet, values) {
  await api('/api/add_row', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ file: currentFile, sheet, values }) });
  await reloadData();
  showTab(sheet.toLowerCase());
};

// ── Tabs ──────────────────────────────────────────────────────────────────
window.showTab = function(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const names = ['project','zones','walls','openings'];
    b.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-pane').forEach(p => {
    p.classList.toggle('active', p.id === 'pane-'+name);
  });
};

// ── Generate gbXML ────────────────────────────────────────────────────────
window.generateXML = async function() {
  if (!currentFile) return;
  status('Generating…', 'busy');
  const r = await api('/api/generate', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ file: currentFile }) });
  const toast = document.getElementById('toast');
  toast.className = r.ok ? 'ok' : 'err';
  toast.textContent = r.ok ? `✓ Generated: ${r.outfile}\n${r.output}` : `✗ Error:\n${r.output||r.error}`;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 6000);
  status(r.ok ? 'gbXML generated' : 'Generate failed', r.ok ? 'ok' : 'err');
};

init();
</script>
